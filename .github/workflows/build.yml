name: Build VST3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth=1 https://github.com/juce-framework/JUCE.git ../JUCE

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: HouseSynth-VST3-Windows
          path: build/**/*.vst3
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth=1 https://github.com/juce-framework/JUCE.git ../JUCE

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Xcode

      - name: Build
        run: cmake --build build --config Release

      - name: Upload AU + VST3
        uses: actions/upload-artifact@v4
        with:
          name: HouseSynth-Mac
          path: |
            build/**/*.vst3
            build/**/*.component
          if-no-files-found: warn
